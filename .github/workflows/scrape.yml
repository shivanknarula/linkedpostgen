name: Nightly LinkedIn Scraper

on:
  schedule:
    # Run every night at 3:00 AM UTC (8:30 AM IST)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allows manual triggering from GitHub UI or Vercel API

# Give the workflow write access to push commits back
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright groq python-dotenv
        playwright install chromium
        playwright install-deps chromium

    - name: Restore LinkedIn Session
      env:
        SESSION_JSON: ${{ secrets.SESSION_JSON }}
      run: |
        if [ -n "$SESSION_JSON" ]; then
          echo "$SESSION_JSON" > session.json
          echo "Restored session.json from GitHub Secrets."
        else
          echo "ERROR: SESSION_JSON secret is not set. Cannot proceed without a LinkedIn session."
          exit 1
        fi

    - name: Run Scraper
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        LINKEDIN_USERNAME: ${{ secrets.LINKEDIN_USERNAME }}
        LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
      run: |
        python scrape_v2.py

    - name: Commit and Push Changes
      id: commit
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add robotics_posts.csv robotics_posts.txt high_value_comments.txt all_scraped_posts.txt generated_links_history.txt || true
        if git diff --staged --quiet; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes to commit"
        else
          git commit -m "Auto-update scraped robotics posts [skip ci]"
          git push origin main
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Trigger Vercel Redeploy
      if: steps.commit.outputs.changed == 'true'
      env:
        VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
      run: |
        if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
          echo "Triggering Vercel redeploy..."
          curl -s -X POST "$VERCEL_DEPLOY_HOOK"
          echo "Vercel redeploy triggered successfully."
        else
          echo "Warning: VERCEL_DEPLOY_HOOK secret not set. Skipping redeploy trigger."
        fi
